[package]
name = "petta"
version = "0.5.0"
edition = "2024"
description = "Efficient MeTTa language implementation in Rust + persistent SWI-Prolog subprocess"
license = "MIT"
readme = "README.md"
repository = "https://github.com/patham9/petta"
keywords = ["metta", "logic", "prolog", "agi", "trueagi"]
categories = ["compilers", "parser-implementations"]

# Workspace: petta + pathmap-derive (proc-macro for inlined PathMap)
[workspace]
resolver = "2"
members = [
    ".",
    "rust/pathmap-derive",
]
default-members = ["."]

[workspace.package]
edition = "2024"

[[bin]]
name = "petta"
path = "rust/src/main.rs"

[lib]
name = "petta"
path = "rust/src/lib.rs"

[dependencies]
tempfile = "3"
thiserror = "2"
tracing = "0.1"
nom = "8"

# MORK (inlined from repos/MORK, compiled conditionally via 'mork' feature)
# MORK dependencies:
smallvec = { version = "1.13", features = ["union"] }
gxhash = "3.5"
xxhash-rust = { version = "0.8", features = ["xxh64", "xxh3", "const_xxh3"] }
fast-slice-utils = "0.1.2"
typed-arena = "2.0"
regex = "1.10"
memmap2 = "0.9.5"
rayon = { version = "1.10", optional = true }
memchr = "2.7"
glob = "0.3"
zip = { version = "2.2", default-features = false }
bstr = "1.10"
futures = "0.3"
rand = "0.9"
itertools = "0.14"
base64 = "0.22"
hex = "0.4"
subprocess = "0.2"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
log = "0.4.27"
env_logger = "0.11.8"
reusing-vec = { version = "0.2.0", features = ["smallvec"] }
maybe-dangling = "0.1.1"
dyn-clone = "1.0.17"
local-or-heap = "0.1.0"
arrayvec = "0.7.6"
num-traits = "0.2"
libz-ng-sys = { version = "1.1", optional = true }

# PathMap (inlined from repos/PathMap)
pathmap-derive = { path = "rust/pathmap-derive" }

# FAISS support (optional, enabled via 'faiss' feature)
faiss = { version = "0.13", optional = true }

# Profiling (enabled via 'profiling' feature)
parking_lot = { version = "0.12", optional = true }

[features]
default = ["swipl"]
swipl = []
pure-rust = []
pathmap-internal-tests = []
serialization = ["dep:libz-ng-sys"]
# MORK zipper-based execution backend (requires nightly)
mork = [
    "swipl",
    "serialization",
]
faiss = ["dep:faiss"]
parallel = ["dep:rayon"]
profiling = ["dep:parking_lot"]

# Workspace dependencies
[workspace.dependencies]
pathmap-derive = { path = "rust/pathmap-derive" }
gxhash = { version = "3.5" }
log = "0.4.27"
env_logger = "0.11.8"
smallvec = { version = "1.13", features = ["union"] }
xxhash-rust = { version = "0.8", features = ["xxh64", "xxh3", "const_xxh3"] }
fast-slice-utils = "0.1.2"
typed-arena = "2.0"
regex = "1.10"
memmap2 = "0.9.5"
rayon = "1.10"
memchr = "2.7"
glob = "0.3"
zip = { version = "2.2", default-features = false }
bstr = "1.10"
futures = "0.3"
rand = "0.9"
itertools = "0.14"
base64 = "0.22"
hex = "0.4"
subprocess = "0.2"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
reusing-vec = { version = "0.2.0", features = ["smallvec"] }
maybe-dangling = "0.1.1"
dyn-clone = "1.0.17"
local-or-heap = "0.1.0"
arrayvec = "0.7.6"
num-traits = "0.2"
